<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; base-uri 'self'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HereWork — Em breve</title>
<meta name="description" content="HereWork, a plataforma de freelancers e projetos do Brasil, está chegando em breve.">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #E8F5E9 0%, #FFFFFF 50%, #FFF3EF 100%);
    color: #1C2B3A;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 560px; }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .logo .dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2E7D32, #F4511E);
  }
  .logo span.brand { color: #1C2B3A; }
  .logo span.brand b { color: #2E7D32; }
  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }
  h1 .accent {
    background: linear-gradient(135deg, #2E7D32, #F4511E);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    font-size: 17px;
    line-height: 1.6;
    color: #4A5568;
    margin-bottom: 28px;
  }
  .badge {
    display: inline-block;
    padding: 10px 22px;
    border-radius: 999px;
    background: #2E7D32;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    box-shadow: 0 8px 24px rgba(46,125,50,0.25);
  }
  footer {
    margin-top: 40px;
    font-size: 13px;
    color: #8A96A8;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <span class="dot"></span>
      <span class="brand">Here<b>Work</b></span>
    </div>
    <h1>Estamos preparando algo <span class="accent">novo</span> para você</h1>
    <p>A HereWork — plataforma de freelancers e projetos do Brasil — está em construção. Em breve você poderá conectar talentos e oportunidades por aqui.</p>
    <span class="badge">Em breve 🚀</span>
    <footer>&copy; 2026 HereWork. Todos os direitos reservados.</footer>
  </div>
</body>
</html>
